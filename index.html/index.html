<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f1ec;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            padding: 20px;
        }

        .team-img {
            width: 90%;
            max-width: 900px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .section {
            margin: 40px 0;
        }

        button {
            padding: 10px 15px;
            border: none;
            background-color: #8c6b3f;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #6e532f;
        }
    </style>
</head>

<body>

    <!-- TASK 1: Correct Formatting -->
    <div class="container section">
        <h1>Learning HTML</h1>
        <p>HTML is <b>very important</b> for web development.</p>
    </div>

    <!-- TASK 2: Formatting Challenge -->
    <div class="container section">
        <h1>Welcome to <b>HTML Learning</b></h1>

        <p>HTML is the <i>standard language</i> for creating webpages.</p>

        <p>Learning HTML is <mark>fun and useful</mark>.</p>

        <p><del>Some old tags are deprecated.</del></p>

        <p><strong>Students must write the HTML code.</strong></p>
    </div>

    <!-- TASK 3: Marquee -->
    <div class="section">
        <marquee behavior="scroll" direction="left">
            👨‍💻 Group 1 - Meet Our Team 👩‍💻
        </marquee>
    </div>

    <!-- TEAM IMAGE -->
    <div class="container">
        <h1>Meet our Team</h1>

        <!-- Replace 'team.jpg' with your actual file name if different -->
        <img src="team.jpg" alt="Our Team" class="team-img">
    </div>

</body>
</html>
